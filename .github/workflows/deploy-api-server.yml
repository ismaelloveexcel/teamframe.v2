name: Deploy api-server to Vercel

on:
  push:
    branches: [main]
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - "lib/api-zod/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_LUgbx4qzGleJbDFrfMKYLjDm
  VERCEL_PROJECT_ID: prj_ySXzNBhVDD5qpY5GkCQkNUY9iBsc

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build

      - name: Build TypeScript project references
        run: pnpm run typecheck:libs

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set Vercel env vars
        working-directory: artifacts/api-server
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEON_APP_USER_PASSWORD: ${{ secrets.NEON_APP_USER_PASSWORD }}
        run: |
          APP_USER_URL="postgresql://app_user:${NEON_APP_USER_PASSWORD}@ep-winter-sun-ab51hx0l.eu-west-2.aws.neon.tech/teamframe?sslmode=require"
          echo "$APP_USER_URL" | vercel env add DATABASE_URL production --token=$VERCEL_TOKEN --force || true
          echo "$APP_USER_URL" | vercel env add APP_USER_DATABASE_URL production --token=$VERCEL_TOKEN --force || true

      - name: Build Vercel output (prebuilt)
        run: vercel build --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: artifacts/api-server
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: artifacts/api-server
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
